<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Fun Wheel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#1a0533 0%,#0d1a3a 50%,#0a2a1a 100%);color:#fff;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-x:hidden}
#app{text-align:center;max-width:560px;width:100%;position:relative;z-index:1}

/* Stars background */
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;animation:twinkle 2s infinite alternate}
@keyframes twinkle{0%{opacity:0.2;transform:scale(1)}100%{opacity:1;transform:scale(1.4)}}

h1{font-size:28px;font-weight:700;margin-bottom:4px;background:linear-gradient(90deg,#ffce54,#ff6b9d,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:hueshift 4s linear infinite}
@keyframes hueshift{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
.sub{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:1.5rem}

/* Wheel */
#wheel-wrap{position:relative;display:inline-block;margin-bottom:1.5rem}
#wheel-glow{position:absolute;top:50%;left:50%;width:320px;height:320px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(192,132,252,0.3) 0%,transparent 70%);animation:pulse-glow 2s ease-in-out infinite;pointer-events:none}
@keyframes pulse-glow{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}}
canvas{display:block;border-radius:50%;cursor:pointer;filter:drop-shadow(0 0 18px rgba(192,132,252,0.5))}
#pointer-wrap{position:absolute;top:50%;right:-30px;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center}
#pointer{font-size:34px;line-height:1;animation:pointer-bounce 0.5s ease-in-out infinite alternate}
@keyframes pointer-bounce{0%{transform:translateX(0)}100%{transform:translateX(-5px)}}

/* Spin button */
#spin-btn{position:relative;overflow:hidden;padding:14px 48px;font-size:17px;font-weight:700;border:none;border-radius:50px;background:linear-gradient(135deg,#c084fc,#818cf8,#38bdf8);color:#fff;cursor:pointer;letter-spacing:0.05em;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 24px rgba(192,132,252,0.5)}
#spin-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.25),transparent);border-radius:50px}
#spin-btn:hover{transform:scale(1.05);box-shadow:0 6px 32px rgba(192,132,252,0.7)}
#spin-btn:active{transform:scale(0.97)}
#spin-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-shine{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);transform:skewX(-20deg);animation:shine 3s infinite}
@keyframes shine{0%{left:-100%}30%,100%{left:150%}}

/* Timer */
#timer-wrap{display:none;margin:12px auto;align-items:center;justify-content:center;gap:12px}
#timer-wrap.show{display:flex}
#timer-circle{position:relative;width:64px;height:64px}
#timer-circle svg{transform:rotate(-90deg)}
#timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:700;color:#fff}
#timer-start{padding:8px 20px;font-size:13px;border:1.5px solid rgba(255,255,255,0.3);border-radius:50px;background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;transition:background 0.15s}
#timer-start:hover{background:rgba(255,255,255,0.2)}

/* Result card */
#result-card{display:none;margin:1.5rem auto 0;max-width:420px;border-radius:20px;padding:1.75rem;position:relative;overflow:hidden;animation:card-in 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes card-in{0%{opacity:0;transform:scale(0.7) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.card-bg{position:absolute;inset:0;opacity:0.15;border-radius:20px}
.card-inner{position:relative;z-index:1}
#result-emoji{font-size:52px;margin-bottom:10px;display:block;animation:emoji-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both}
@keyframes emoji-pop{0%{transform:scale(0) rotate(-30deg)}100%{transform:scale(1) rotate(0deg)}}
#result-cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px;opacity:0.85}
#result-text{font-size:16px;line-height:1.65;color:#fff;font-weight:500}
.action-row{display:flex;gap:10px;margin-top:18px;justify-content:center;flex-wrap:wrap}
.action-btn{padding:9px 22px;font-size:13px;font-weight:600;border:1.5px solid rgba(255,255,255,0.3);border-radius:50px;background:rgba(255,255,255,0.12);color:#fff;cursor:pointer;transition:background 0.15s,transform 0.1s;backdrop-filter:blur(4px)}
.action-btn:hover{background:rgba(255,255,255,0.25);transform:scale(1.04)}
.action-btn.primary{background:rgba(255,255,255,0.9);color:#1a0533}
.action-btn.primary:hover{background:#fff}

/* Player mode */
#player-section{margin-bottom:1.2rem}
#player-display{font-size:15px;color:rgba(255,255,255,0.85);margin-bottom:8px;min-height:22px}
#player-name{font-weight:700;color:#ffce54;font-size:17px}
#add-player-row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:8px}
#player-input{padding:8px 14px;border-radius:50px;border:1.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;font-size:14px;outline:none;width:160px}
#player-input::placeholder{color:rgba(255,255,255,0.4)}
#player-input:focus{border-color:rgba(192,132,252,0.7)}
#add-player-btn{padding:8px 18px;font-size:13px;border:1.5px solid rgba(255,255,255,0.3);border-radius:50px;background:rgba(255,255,255,0.15);color:#fff;cursor:pointer}
#add-player-btn:hover{background:rgba(255,255,255,0.25)}
#players-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:6px;min-height:28px}
.player-chip{padding:4px 14px;border-radius:50px;font-size:12px;font-weight:600;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;cursor:pointer;transition:background 0.15s}
.player-chip.active{background:rgba(192,132,252,0.4);border-color:#c084fc}
.player-chip:hover{background:rgba(255,255,255,0.2)}

/* Score board */
.score-row{display:flex;justify-content:center;gap:20px;margin-top:1.5rem;flex-wrap:wrap}
.score-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:10px 18px;min-width:70px;backdrop-filter:blur(4px)}
.score-label{font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.score-val{font-size:22px;font-weight:700;color:#fff}

/* Confetti */
.confetti-piece{position:fixed;top:-10px;border-radius:2px;animation:confetti-fall linear forwards;pointer-events:none;z-index:999}
@keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg) translateX(var(--drift));opacity:0}}

/* Tick mark on wheel */
@keyframes tick-flash{0%,100%{opacity:0}50%{opacity:1}}

/* Dark overlay modal for result */
#overlay{display:none;position:fixed;inset:0;background:rgba(10,5,25,0.6);z-index:100;backdrop-filter:blur(3px);align-items:center;justify-content:center}
#overlay.show{display:flex}
#modal{max-width:420px;width:90%;border-radius:24px;padding:2rem;position:relative;overflow:hidden;animation:card-in 0.4s cubic-bezier(0.34,1.56,0.64,1)}
</style>
</head>
<body>
<div id="stars"></div>

<div id="app">
  <h1>✨ Spin the Fun Wheel</h1>
  <p class="sub">For everyone — dare, trivia, perform, or get lucky!</p>

  <!-- Players -->
  <div id="player-section">
    <div id="add-player-row">
      <input id="player-input" type="text" placeholder="Add player name..." maxlength="16">
      <button id="add-player-btn">+ Add</button>
    </div>
    <div id="players-list"></div>
    <div id="player-display">Solo mode — <span style="opacity:0.6">add players for turn-by-turn!</span></div>
  </div>

  <!-- Wheel -->
  <div id="wheel-wrap">
    <div id="wheel-glow"></div>
    <canvas id="wheel" width="300" height="300"></canvas>
    <div id="pointer-wrap"><div id="pointer">◀</div></div>
  </div>
  <br>
  <button id="spin-btn"><span class="btn-shine"></span>🎰 SPIN!</button>

  <!-- Timer -->
  <div id="timer-wrap">
    <svg id="timer-circle" width="64" height="64">
      <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="5"/>
      <circle id="timer-arc" cx="32" cy="32" r="28" fill="none" stroke="#c084fc" stroke-width="5" stroke-dasharray="176" stroke-dashoffset="0" stroke-linecap="round"/>
      <text id="timer-num" x="32" y="37" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" transform="rotate(90,32,32)">30</text>
    </svg>
    <button id="timer-start">▶ Start Timer</button>
    <button id="timer-stop" style="display:none;padding:8px 20px;font-size:13px;border:1.5px solid rgba(255,100,100,0.4);border-radius:50px;background:rgba(255,80,80,0.15);color:#ff8080;cursor:pointer">■ Stop</button>
  </div>

  <!-- Scores -->
  <div class="score-row">
    <div class="score-card"><div class="score-label">Spins</div><div class="score-val" id="total">0</div></div>
    <div class="score-card"><div class="score-label">Done</div><div class="score-val" id="done-count">0</div></div>
    <div class="score-card"><div class="score-label">Skipped</div><div class="score-val" id="skip-count">0</div></div>
  </div>
</div>

<!-- Result overlay -->
<div id="overlay">
  <div id="modal">
    <div class="card-bg" id="modal-bg"></div>
    <div class="card-inner">
      <span id="result-emoji"></span>
      <div id="result-cat"></div>
      <div id="result-text"></div>
      <div class="action-row">
        <button class="action-btn primary" id="done-btn">✅ Done!</button>
        <button class="action-btn" id="skip-btn">⏭ Skip</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────
const segments = [
  {label:"Dare",   color:"#D85A30"},
  {label:"Trivia", color:"#185FA5"},
  {label:"Perform",color:"#7C3AED"},
  {label:"Truth",  color:"#0F6E56"},
  {label:"Lucky",  color:"#BA7517"},
  {label:"Funny",  color:"#993556"},
  {label:"Move",   color:"#3B6D11"},
  {label:"Wild",   color:"#A32D2D"},
];
const tasks = {
  Dare:   ["Do your best robot dance for 10 seconds!","Speak in a funny accent for 2 minutes!","Let someone tickle you for 5 seconds!","Do 10 push-ups right now!","Wear socks on your hands for the next round!","Moonwalk across the room!"],
  Trivia: ["What planet is closest to the Sun? (Mercury)","How many sides does a hexagon have? (6)","Capital of Japan? (Tokyo)","What gas do plants absorb? (CO₂)","Who painted the Mona Lisa? (da Vinci)","Bones in the human body? (206)"],
  Perform:["Sing any chorus right now!","Impersonate a famous celebrity!","Tell a 1-min stand-up joke!","Act like a chicken for 15 seconds!","Mime eating a giant burger in slow motion!","Do your best superhero landing pose!"],
  Truth:  ["What is your most embarrassing moment?","What talent do you wish you had?","What is your weirdest food combo?","Who was your first crush?","What did you believe as a kid that was totally wrong?","What is the last lie you told?"],
  Lucky:  ["🎉 Free pass! Skip this turn with honour!","🌟 Give a compliment to someone here!","🍀 Make up a new rule for one round!","🎁 Everyone claps for you for 10 seconds!","✨ Earn a free snack (or pick your reward)!","🏆 Collect +2 bonus points!"],
  Funny:  ["Laugh non-stop for 15 seconds — no reason!","Say 'banana' after every sentence for 1 minute!","Try to lick your elbow!","Make the ugliest face you can, hold for 5 sec!","Narrate your actions like a sports commentator for 30 sec!","Do your best impression of a melting snowman!"],
  Move:   ["Do 15 jumping jacks!","Hold a plank for 20 seconds!","Spin around 5 times then walk straight!","Do the worm (or attempt it)!","Do your best slow-motion run across the room!","Balance on one leg for 30 seconds!"],
  Wild:   ["Switch seats with someone!","Everyone follows the last player's order for 1 round!","Make a rule lasting 3 spins!","Group decides what you do!","Call someone on speaker, say 'Can you keep a secret?' then hang up!","Swap one item of clothing with the person to your left!"]
};
const emojis    = {Dare:'😈',Trivia:'🧠',Perform:'🎤',Truth:'💬',Lucky:'🍀',Funny:'😂',Move:'💃',Wild:'🎲'};
const bgColors  = {Dare:'linear-gradient(135deg,#7c1d06,#D85A30)',Trivia:'linear-gradient(135deg,#042c53,#185FA5)',Perform:'linear-gradient(135deg,#2e1065,#7C3AED)',Truth:'linear-gradient(135deg,#04342c,#0F6E56)',Lucky:'linear-gradient(135deg,#412402,#BA7517)',Funny:'linear-gradient(135deg,#4b1528,#993556)',Move:'linear-gradient(135deg,#173404,#3B6D11)',Wild:'linear-gradient(135deg,#501313,#A32D2D)'};

// ── Stars ─────────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*3+1;
  s.style.cssText=`width:${sz}px;height:${sz}px;background:#fff;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s`;
  starsEl.appendChild(s);
}

// ── Canvas Wheel ──────────────────────────────────────────
const canvas=document.getElementById('wheel');
const ctx=canvas.getContext('2d');
const n=segments.length, arc=2*Math.PI/n;
let angle=0, spinning=false;
let totalSpins=0, doneCount=0, skipCount=0;
let highlightIdx=-1;

function drawWheel(rot){
  ctx.clearRect(0,0,300,300);
  const cx=150,cy=150,r=138;
  for(let i=0;i<n;i++){
    const start=rot+i*arc-Math.PI/2, end=start+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();
    ctx.fillStyle = i===highlightIdx ? lighten(segments[i].color,40) : segments[i].color;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;ctx.stroke();
    // label
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+arc/2);
    ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.font='bold 13px system-ui,sans-serif';
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=4;
    ctx.fillText(segments[i].label,r-10,5);
    ctx.restore();
    // emoji
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+arc/2);
    ctx.font='16px serif';ctx.textAlign='right';ctx.shadowBlur=0;
    ctx.fillText(Object.values(emojis)[i],r-70,6);
    ctx.restore();
  }
  // outer ring
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=3;ctx.stroke();
  // hub
  ctx.beginPath();ctx.arc(cx,cy,22,0,2*Math.PI);
  const g=ctx.createRadialGradient(cx-4,cy-4,2,cx,cy,22);
  g.addColorStop(0,'#fff');g.addColorStop(1,'#ccc');
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.stroke();
  // hub dot
  ctx.beginPath();ctx.arc(cx,cy,7,0,2*Math.PI);
  ctx.fillStyle='#aaa';ctx.fill();
}

function lighten(hex,amt){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}

drawWheel(angle);

// ── Spin ──────────────────────────────────────────────────
function easeOut(t){return 1-Math.pow(1-t,4);}

// tick sound simulation via pointer bounce
let lastSeg=-1;
function checkTick(rot){
  const norm=((rot%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  const ptr=(Math.PI*2-norm+Math.PI/2+Math.PI*2)%(Math.PI*2);
  const idx=Math.floor(ptr/arc)%n;
  if(idx!==lastSeg){
    lastSeg=idx;
    highlightIdx=idx;
    const p=document.getElementById('pointer');
    p.style.transform='translateX(-4px)';
    setTimeout(()=>{p.style.transform='';},80);
    // small audio tick
    try{
      const ac=new (window.AudioContext||window.webkitAudioContext)();
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=600+idx*40;g.gain.setValueAtTime(0.08,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.06);
      o.start();o.stop(ac.currentTime+0.06);
    }catch(e){}
  }
}

function spin(){
  if(spinning)return;
  spinning=true;highlightIdx=-1;lastSeg=-1;
  totalSpins++;document.getElementById('total').textContent=totalSpins;
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('overlay').classList.remove('show');
  const extra=Math.PI*2*(10+Math.random()*10);
  const dur=3500+Math.random()*1000;
  const startTime=performance.now(), startAngle=angle;
  function frame(now){
    const t=Math.min((now-startTime)/dur,1);
    angle=startAngle+extra*easeOut(t);
    checkTick(angle);
    drawWheel(angle);
    if(t<1){requestAnimationFrame(frame);}
    else{
      spinning=false;highlightIdx=-1;
      document.getElementById('spin-btn').disabled=false;
      drawWheel(angle);
      showResult();
    }
  }
  requestAnimationFrame(frame);
}

// ── Result ────────────────────────────────────────────────
function showResult(){
  const norm=((angle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  const ptr=(Math.PI*2-norm+Math.PI/2+Math.PI*2)%(Math.PI*2);
  const idx=Math.floor(ptr/arc)%n;
  const seg=segments[idx];
  const list=tasks[seg.label];
  const task=list[Math.floor(Math.random()*list.length)];

  document.getElementById('result-emoji').textContent=emojis[seg.label];
  document.getElementById('result-cat').textContent=seg.label;
  document.getElementById('result-cat').style.color='rgba(255,255,255,0.7)';
  document.getElementById('result-text').textContent=task;
  document.getElementById('modal').style.background=bgColors[seg.label];
  document.getElementById('modal-bg').style.background='';

  // player display
  if(players.length>0){
    document.getElementById('player-display').innerHTML=`<span id="player-name">${players[currentPlayer]}</span>'s turn!`;
  }

  document.getElementById('overlay').classList.add('show');
  // show timer
  document.getElementById('timer-wrap').classList.add('show');
  resetTimer();
  launchConfetti(seg.color);
}

// ── Confetti ──────────────────────────────────────────────
function launchConfetti(mainColor){
  const colors=['#ffce54','#ff6b9d','#c084fc','#38bdf8','#4ade80',mainColor];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    const w=6+Math.random()*8, h=8+Math.random()*12;
    el.style.cssText=`width:${w}px;height:${h}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}vw;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;--drift:${(Math.random()-0.5)*200}px`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

// ── Timer ─────────────────────────────────────────────────
let timerInterval=null, timerSec=30;
const timerArc=document.getElementById('timer-arc');
const timerNum=document.getElementById('timer-num');
const circumference=176;

function resetTimer(){
  clearInterval(timerInterval);timerInterval=null;
  timerSec=30;timerNum.textContent='30';
  timerArc.style.stroke='#c084fc';
  timerArc.setAttribute('stroke-dashoffset','0');
  document.getElementById('timer-start').style.display='';
  document.getElementById('timer-stop').style.display='none';
}
function startTimer(){
  if(timerInterval)return;
  document.getElementById('timer-start').style.display='none';
  document.getElementById('timer-stop').style.display='';
  timerInterval=setInterval(()=>{
    timerSec--;
    timerNum.textContent=timerSec;
    const offset=circumference*(1-timerSec/30);
    timerArc.setAttribute('stroke-dashoffset',offset);
    if(timerSec<=10)timerArc.style.stroke='#f87171';
    if(timerSec<=0){
      clearInterval(timerInterval);timerInterval=null;
      timerNum.textContent='⏰';
      try{
        const ac=new(window.AudioContext||window.webkitAudioContext)();
        [0,0.15,0.3].forEach(d=>{
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.frequency.value=880;g.gain.setValueAtTime(0.15,ac.currentTime+d);
          g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d+0.2);
          o.start(ac.currentTime+d);o.stop(ac.currentTime+d+0.2);
        });
      }catch(e){}
    }
  },1000);
}
document.getElementById('timer-start').addEventListener('click',startTimer);
document.getElementById('timer-stop').addEventListener('click',()=>{clearInterval(timerInterval);timerInterval=null;resetTimer();});

// ── Players ───────────────────────────────────────────────
let players=[], currentPlayer=0;
function renderPlayers(){
  const list=document.getElementById('players-list');
  list.innerHTML='';
  players.forEach((p,i)=>{
    const chip=document.createElement('div');
    chip.className='player-chip'+(i===currentPlayer?' active':'');
    chip.textContent=p;
    chip.onclick=()=>{currentPlayer=i;renderPlayers();updatePlayerDisplay();};
    list.appendChild(chip);
  });
  updatePlayerDisplay();
}
function updatePlayerDisplay(){
  const d=document.getElementById('player-display');
  if(players.length===0){d.innerHTML='Solo mode — <span style="opacity:0.6">add players for turn-by-turn!</span>';}
  else{d.innerHTML=`Up next: <span id="player-name">${players[currentPlayer]}</span>`;}
}
document.getElementById('add-player-btn').addEventListener('click',()=>{
  const inp=document.getElementById('player-input');
  const name=inp.value.trim();
  if(name&&players.length<8){players.push(name);inp.value='';renderPlayers();}
});
document.getElementById('player-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-player-btn').click();});

// ── Done / Skip ───────────────────────────────────────────
document.getElementById('done-btn').addEventListener('click',()=>{
  doneCount++;document.getElementById('done-count').textContent=doneCount;
  nextPlayer();closeResult();
});
document.getElementById('skip-btn').addEventListener('click',()=>{
  skipCount++;document.getElementById('skip-count').textContent=skipCount;
  nextPlayer();closeResult();
});
function nextPlayer(){if(players.length>0)currentPlayer=(currentPlayer+1)%players.length;renderPlayers();}
function closeResult(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('timer-wrap').classList.remove('show');
  resetTimer();
}

// ── Spin triggers ─────────────────────────────────────────
document.getElementById('spin-btn').addEventListener('click',spin);
canvas.addEventListener('click',spin);

// Init
renderPlayers();drawWheel(0);
</script>
</body>
</html>
